version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-production:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-routine:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
